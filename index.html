<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NeriPlayer</title>
    <script>
      // 在任何 CSS/JS 加载前，立即从 localStorage 读取主题模式并设置背景色
      // 这是消除闪黑/闪白的关键 — 必须内联在 <head> 最前面
      (function() {
        var mode = localStorage.getItem('theme-mode') || 'system';
        var isDark = mode === 'dark' || (mode === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
        // 浅色背景 rgb(252,248,253) = .light-theme --md-surface
        // 深色背景 rgb(20,18,24) = :root --md-surface
        var bg = isDark ? 'rgb(20,18,24)' : 'rgb(252,248,253)';
        var fg = isDark ? 'rgb(230,225,229)' : 'rgb(28,27,31)';
        document.documentElement.style.background = bg;
        document.documentElement.style.color = fg;
        document.documentElement.className = isDark ? 'dark-theme' : 'light-theme';
      })();
    </script>
    <style>
      /* 本地字体 — 零网络依赖 */
      @font-face {
        font-family: 'Material Symbols Rounded';
        font-style: normal;
        font-weight: 100 700;
        font-display: block;
        src: url(/fonts/MaterialSymbolsRounded.woff2) format('woff2');
      }
      @font-face {
        font-family: 'Inter';
        font-style: normal;
        font-weight: 100 900;
        font-display: swap;
        src: url(/fonts/Inter-Variable.woff2) format('woff2');
      }
      @font-face {
        font-family: 'MiSans';
        font-style: normal;
        font-weight: 400;
        font-display: swap;
        src: url(/fonts/MiSans-Regular.woff2) format('woff2');
      }
      @font-face {
        font-family: 'MiSans';
        font-style: normal;
        font-weight: 500;
        font-display: swap;
        src: url(/fonts/MiSans-Medium.woff2) format('woff2');
      }
      @font-face {
        font-family: 'MiSans';
        font-style: normal;
        font-weight: 600;
        font-display: swap;
        src: url(/fonts/MiSans-Semibold.woff2) format('woff2');
      }
      @font-face {
        font-family: 'MiSans';
        font-style: normal;
        font-weight: 700;
        font-display: swap;
        src: url(/fonts/MiSans-Bold.woff2) format('woff2');
      }
      html, body {
        margin: 0;
        overflow: hidden;
      }
      /* 图标字体基础声明 */
      .material-symbols-rounded {
        font-family: 'Material Symbols Rounded';
        font-weight: normal;
        font-style: normal;
        font-size: 24px;
        line-height: 1;
        letter-spacing: normal;
        text-transform: none;
        display: inline-block;
        white-space: nowrap;
        word-wrap: normal;
        direction: ltr;
        -webkit-font-smoothing: antialiased;
        font-feature-settings: 'liga';
        vertical-align: middle;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
